server:
  http_listen_port: 3200

distributor:
  log_received_spans:
    enabled: false
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: "0.0.0.0:4317"
        http:
          endpoint: "0.0.0.0:4318"

ingester:
  trace_idle_period: 30s
  max_block_bytes: 500_000
  max_block_duration: 5m
  flush_check_period: 2m

compactor:
  compaction:
    compaction_window: 1h
    max_block_bytes: 50_000_000
    block_retention: 48h

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal
    pool:
      max_workers: 10
      queue_depth: 100

metrics_generator:
  registry:
    external_labels:
      source: tempo
    stale_duration: 5m
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
