apiVersion: 1

groups:
  - orgId: 1
    name: Maestrio Alerts
    folder: Maestrio
    interval: 1m
    rules:
      - uid: maestrio-high-error-rate
        title: High Error Rate
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: grafana_prometheus
            model:
              expr: sum(rate(http_request_duration_seconds_count{status_code=~"5.."}[5m]))
              instant: true
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: grafana_prometheus
            model:
              expr: sum(rate(http_request_duration_seconds_count[5m]))
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: math
              expression: ($A / $B) * 100 > 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "5xx error rate exceeds 5%"

      - uid: maestrio-high-p95-latency
        title: High P95 Latency
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: grafana_prometheus
            model:
              expr: histogram_quantile(0.95, sum(rate(http_request_duration_seconds_bucket[5m])) by (le)) > 2
              instant: true
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "P95 latency exceeds 2 seconds"

      - uid: maestrio-pool-exhaustion
        title: Connection Pool Exhaustion
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 120
              to: 0
            datasourceUid: grafana_prometheus
            model:
              expr: (db_pool_waiting / db_pool_total) * 100 > 80
              instant: true
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Database connection pool saturation exceeds 80%"

      - uid: maestrio-worker-failure-rate
        title: Worker Failure Rate
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: grafana_prometheus
            model:
              expr: sum(rate(worker_dispatch_errors_total[5m]))
              instant: true
          - refId: B
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: grafana_prometheus
            model:
              expr: sum(rate(worker_dispatch_duration_seconds_count[5m]))
              instant: true
          - refId: C
            datasourceUid: __expr__
            model:
              type: math
              expression: ($A / $B) * 100 > 10
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Worker failure rate exceeds 10%"

      - uid: maestrio-high-memory
        title: High Memory Usage
        condition: A
        data:
          - refId: A
            relativeTimeRange:
              from: 600
              to: 0
            datasourceUid: grafana_prometheus
            model:
              expr: process_resident_memory_bytes > 536870912
              instant: true
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "RSS memory exceeds 512MB"
